name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Coverage regression check
        run: |
          # Attempt to get base branch coverage for regression comparison
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            git fetch origin "$BASE_SHA" --depth=1 || true

            # Try to generate base coverage
            mkdir -p /tmp/base-coverage
            git worktree add /tmp/base-worktree "$BASE_SHA" 2>/dev/null || true
            if [ -d /tmp/base-worktree ]; then
              cd /tmp/base-worktree
              npm ci 2>/dev/null || true
              npx vitest run --coverage 2>/dev/null || true
              if [ -f coverage/coverage-summary.json ]; then
                cp coverage/coverage-summary.json /tmp/base-coverage/coverage-summary.json
              fi
              cd -
              git worktree remove /tmp/base-worktree --force 2>/dev/null || true
            fi
          fi

          node scripts/check-coverage-regression.mjs \
            /tmp/base-coverage/coverage-summary.json \
            coverage/coverage-summary.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
