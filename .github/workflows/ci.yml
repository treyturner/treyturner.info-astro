name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Coverage regression check
        run: |
          # Attempt to get base branch coverage for regression comparison
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            git fetch origin "$BASE_SHA" --depth=1 || true

            # Try to generate base coverage
            mkdir -p /tmp/base-coverage
            git worktree add /tmp/base-worktree "$BASE_SHA" 2>/dev/null || true
            if [ -d /tmp/base-worktree ]; then
              cd /tmp/base-worktree
              npm ci 2>/dev/null || true
              npx vitest run --coverage 2>/dev/null || true
              if [ -f coverage/coverage-summary.json ]; then
                cp coverage/coverage-summary.json /tmp/base-coverage/coverage-summary.json
              fi
              cd -
              git worktree remove /tmp/base-worktree --force 2>/dev/null || true
            fi
          fi

          node scripts/check-coverage-regression.mjs \
            /tmp/base-coverage/coverage-summary.json \
            coverage/coverage-summary.json

      - name: Generate Allure HTML report
        if: always()
        shell: bash -euo pipefail {0}
        run: |
          if [ -d allure-results ]; then
            npx allure generate allure-results -o allure-report --clean
          else
            echo "::warning::allure-results/ directory not found — skipping report generation"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      # --- S3 report uploads (MinIO-backed) ---
      # Upload path format:
      #   s3://test-reports/treyturner.info-astro/<YYYY-mm-DD-HH-MM-SS>/<report-type>/...
      # Example:
      #   s3://test-reports/treyturner.info-astro/2026-03-28-05-43-00/coverage/...
      #   s3://test-reports/treyturner.info-astro/2026-03-28-05-43-00/playwright/...
      #   s3://test-reports/treyturner.info-astro/2026-03-28-05-43-00/allure/...

      - name: Set report timestamp
        if: always()
        id: report-ts
        shell: bash -euo pipefail {0}
        run: echo "ts=$(date -u +'%Y-%m-%d-%H-%M-%S')" >> "$GITHUB_OUTPUT"

      - name: Upload coverage report to S3
        if: always()
        shell: bash -euo pipefail {0}
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          S3_PREFIX="s3://test-reports/treyturner.info-astro/${{ steps.report-ts.outputs.ts }}/coverage"
          if [ -d coverage ]; then
            aws s3 cp --recursive --endpoint-url "${{ vars.S3_URL }}" coverage/ "${S3_PREFIX}/"
          else
            echo "::warning::coverage/ directory not found — skipping S3 upload"
          fi

      - name: Upload Playwright report to S3
        if: always()
        shell: bash -euo pipefail {0}
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          S3_PREFIX="s3://test-reports/treyturner.info-astro/${{ steps.report-ts.outputs.ts }}/playwright"
          if [ -d playwright-report ]; then
            aws s3 cp --recursive --endpoint-url "${{ vars.S3_URL }}" playwright-report/ "${S3_PREFIX}/"
          else
            echo "::warning::playwright-report/ directory not found — skipping S3 upload"
          fi

      - name: Upload Allure report to S3
        if: always()
        shell: bash -euo pipefail {0}
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          S3_PREFIX="s3://test-reports/treyturner.info-astro/${{ steps.report-ts.outputs.ts }}/allure"
          if [ -d allure-report ]; then
            aws s3 cp --recursive --endpoint-url "${{ vars.S3_URL }}" allure-report/ "${S3_PREFIX}/"
          else
            echo "::warning::allure-report/ directory not found — skipping S3 upload"
          fi

      - name: Add report links to job summary
        if: always()
        shell: bash -euo pipefail {0}
        run: |
          TS="${{ steps.report-ts.outputs.ts }}"
          BASE="${{ vars.S3_URL }}/test-reports/treyturner.info-astro/${TS}"
          COV_URL="${BASE}/coverage/lcov-report/index.html"
          PW_URL="${BASE}/playwright/index.html"
          ALLURE_URL="${BASE}/allure/index.html"
          {
            echo "## 📋 Test Reports"
            echo ""
            echo "- Coverage: [${COV_URL}](${COV_URL})"
            echo "- Playwright: [${PW_URL}](${PW_URL})"
            echo "- Allure: [${ALLURE_URL}](${ALLURE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
